server:
  port: 8082
spring:
  application:
    name: dashboard-service
  datasource:
    #url: jdbc:postgresql://localhost:5434/dashboarddb
    url: jdbc:postgresql://localhost:5432/dashboarddb
    username: dashboard_user
    password: dashboard_pass

  jpa:
    properties:
      hibernate.jdbc.time_zone: Asia/Kolkata
    hibernate:
      ddl-auto: update
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379

security:
  jwt:
    secret: ${JWT_SECRET:u6r0uG5w2rZ6p9p6+Rz0xv2Yp4R1z0sVb0y4xH3Fq5E=}
logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.dashboard: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always